<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paneer Tikka | AR Menu</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
text-align:center;
}

model-viewer{
width:100%;
height:380px;
background:#000;
border-radius:16px;
margin-bottom:20px;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:14px;
color:#aaa;
}

h1{
font-size:28px;
font-weight:600;
margin:8px 0;
}

.price{
font-size:22px;
color:#ffb347;
margin-bottom:14px;
}

.description{
font-size:14px;
color:#bbb;
line-height:1.6;
margin-bottom:20px;
}

.allergens{
font-size:13px;
color:#aaa;
margin-bottom:30px;
}

button{
padding:14px 28px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:500;
background:#ff6b35;
color:white;
cursor:pointer;
}

button:hover{
background:#ff7b45;
}

</style>

</head>

<body>

<div class="container">

<model-viewer

id="dishViewer"

src="\final_models\snacks\paneer-tikka.glb"
ios-src="paneer-tikka.usdz"

ar
ar-modes="webxr scene-viewer quick-look"

camera-controls

auto-rotate
auto-rotate-delay="2000"
rotation-per-second="20deg"

shadow-intensity="1.2"
shadow-softness="0.8"

environment-image="studio"
exposure="1.2"

camera-orbit="0deg 75deg 105%"
field-of-view="30deg"

loading="eager"

>

<div class="loading" id="loadingText">
Preparing your dish...
</div>

<button slot="ar-button">
View on your table 🍽
</button>

</model-viewer>

<h1>Paneer Tikka</h1>

<div class="price">₹249</div>

<div class="description">
Marinated cottage cheese cubes grilled to perfection
with bell peppers and onions, served with mint chutney.
</div>

<div class="allergens">
Allergens: Dairy
</div>

</div>

<script>

const viewer = document.getElementById("dishViewer");
const loading = document.getElementById("loadingText");

viewer.addEventListener("load", () => {
loading.style.display="none";
});

</script>

</body>
</html>
